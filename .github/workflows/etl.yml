name: Update Data

on:
  # Manual trigger only — run from GitHub UI when needed.
  # We don't schedule automatic runs to avoid unnecessary API calls
  # to government portals. Trigger manually when you want fresh data.
  workflow_dispatch:

jobs:
  etl:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pipeline
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data from government APIs
        run: python fetch.py

      - name: Transform and merge data
        run: python merge.py

      - name: Clone data repo
        run: |
          git clone https://x-access-token:${{ secrets.DATA_REPO_TOKEN }}@github.com/commons-au/data.git data-repo

      - name: Copy output to data repo
        run: |
          # Remove old data files (keep .gitkeep), then copy fresh output
          find data-repo/gov -name '*.csv' -o -name 'SOURCES.md' | xargs rm -f
          find data-repo/combined -name '*.csv' -o -name '*.json' -o -name 'SOURCES.md' | xargs rm -f
          # Copy per-source government data (creates new state dirs as needed)
          cp -r output/gov/. data-repo/gov/
          # Copy combined data
          cp -r output/combined/. data-repo/combined/

      - name: Update README with fetch status
        run: |
          cd data-repo
          DATE=$(date -u +"%d %B %Y")
          RECORDS=$(tail -n +2 combined/services.csv | wc -l | tr -d ' ')
          SOURCES=$(ls gov/*/SOURCES.md 2>/dev/null | wc -l | tr -d ' ')
          STATUS="**Last updated**: ${DATE} | **${RECORDS} services** from **${SOURCES} state(s)**"
          export STATUS
          python3 << 'PYEOF'
          import os, re
          status = os.environ["STATUS"]
          with open("README.md", "r") as f:
              content = f.read()
          content = re.sub(
              r"<!-- PIPELINE_STATUS_START -->.*?<!-- PIPELINE_STATUS_END -->",
              f"<!-- PIPELINE_STATUS_START -->\n{status}\n<!-- PIPELINE_STATUS_END -->",
              content,
              flags=re.DOTALL,
          )
          with open("README.md", "w") as f:
              f.write(content)
          PYEOF

      - name: Commit and push to data repo
        run: |
          cd data-repo
          git config user.name "commons-au-bot"
          git config user.email "bot@commons-au.org"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update data from government sources ($(date -u +%Y-%m-%d))"
            git push
          fi
