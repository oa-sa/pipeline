name: Update Data

on:
  workflow_dispatch:

jobs:
  fetch-gov:
    name: Fetch Government Data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python fetch.py --filter gov
      - uses: actions/upload-artifact@v4
        with:
          name: sources-gov
          path: sources/
          retention-days: 1

  fetch-osm:
    name: Fetch OpenStreetMap Data
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python fetch.py --filter osm
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: sources-osm
          path: sources/
          retention-days: 1

  build:
    name: Transform and Merge
    runs-on: ubuntu-latest
    needs: [fetch-gov]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt

      - uses: actions/download-artifact@v4
        with:
          name: sources-gov
          path: sources/

      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: sources-osm
          path: sources/

      - run: python merge.py

      - uses: actions/upload-artifact@v4
        with:
          name: output
          path: output/
          retention-days: 1

  publish:
    name: Publish to Data Repo
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: output
          path: output/

      - name: Clone data repo
        run: |
          git clone https://x-access-token:${{ secrets.DATA_REPO_TOKEN }}@github.com/commons-au/data.git data-repo

      - name: Copy output to data repo
        run: |
          find data-repo/gov -name '*.csv' -o -name 'SOURCES.md' | xargs rm -f
          find data-repo/combined -name '*.csv' -o -name '*.json' -o -name '*.db' -o -name 'SOURCES.md' | xargs rm -f
          find data-repo/osm -name '*.csv' -o -name 'SOURCES.md' 2>/dev/null | xargs rm -f
          cp -r output/gov/. data-repo/gov/
          if [ -d output/osm ]; then
            mkdir -p data-repo/osm
            cp -r output/osm/. data-repo/osm/
          fi
          cp -r output/combined/. data-repo/combined/

      - name: Update README with fetch status
        run: |
          cd data-repo
          DATE=$(date -u +"%d %B %Y")
          RECORDS=$(tail -n +2 combined/services.csv | wc -l | tr -d ' ')
          SOURCES=$(ls gov/*/SOURCES.md 2>/dev/null | wc -l | tr -d ' ')
          STATUS="**Last updated**: ${DATE} | **${RECORDS} services** from **${SOURCES} state(s)**"
          export STATUS
          python3 << 'PYEOF'
          import os, re
          status = os.environ["STATUS"]
          with open("README.md", "r") as f:
              content = f.read()
          content = re.sub(
              r"<!-- PIPELINE_STATUS_START -->.*?<!-- PIPELINE_STATUS_END -->",
              f"<!-- PIPELINE_STATUS_START -->\n{status}\n<!-- PIPELINE_STATUS_END -->",
              content,
              flags=re.DOTALL,
          )
          with open("README.md", "w") as f:
              f.write(content)
          PYEOF

      - name: Commit and push to data repo
        run: |
          cd data-repo
          git config user.name "commons-au-bot"
          git config user.email "bot@commons-au.org"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update data from government + OSM sources ($(date -u +%Y-%m-%d))"
            git push
          fi
